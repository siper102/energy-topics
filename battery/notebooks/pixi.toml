[workspace]
authors = ["Simon Perschel <simon.perschel@t-online.de>"]
channels = ["conda-forge"]
name = "battery"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
setup = "pixi install"
notebook = "jupyter lab --notebook-dir=notebooks"
data = "python scripts/generate_runs.py"
backend-api = { cmd = "uvicorn main:app --host 0.0.0.0 --port 8000", env = { PYTHONPATH = "backend/src" } }
backend-worker = { cmd = "celery -A worker.celery_app worker --loglevel=info", env = { PYTHONPATH = "backend/src" } }

[dependencies]
python = ">=3.14.6,<3.15"
ipopt = ">=3.14.19,<4"
pyomo = ">=6.10.1,<7"
pandas = ">=3.0.3,<4"
numpy = ">=2.5.0,<3"
matplotlib = ">=3.11.0,<4"
seaborn = ">=0.13.2,<0.14"
jupyterlab = ">=4.6.0,<5"
arch-py = ">=8.0.0,<9"
fastapi = ">=0.138.0,<0.139"
uvicorn = ">=0.49.0,<0.50"
celery = ">=5.5.3,<6"
redis-py = ">=8.0.0,<9"
pydantic = ">=2.13.4,<3"
httpx = ">=0.28.1,<0.29"
requests = ">=2.34.2,<3"
python-dotenv = ">=1.2.2,<2"
fastparquet = ">=2026.5.0,<2027"
joblib = ">=1.5.3,<2"
pyarrow = ">=24.0.0,<25"
scikit-learn = ">=1.9.0,<2"
pytorch = ">=2.12.0,<3"

[pypi-dependencies]
sqlmodel = ">=0.0.38, <0.0.39"
entsoe-py = ">=0.8.0, <0.9"
bentoml = ">=1.4.39, <2"
psycopg = { version = ">=3.3.4, <4", extras = ["binary"] }
